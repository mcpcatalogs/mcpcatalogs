name: Publish to npm

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - run: npm ci

      - run: npm run build

      # Sanity-check: refuse to publish if the embedded anon key assignment is
      # still the placeholder. We target only the assignment line — the same
      # string also appears in the runtime guard (`=== "REPLACE_BEFORE_PUBLISH"`)
      # by design, so a naive grep would false-positive.
      - name: Verify anon key is set
        run: |
          if grep -qE 'EMBEDDED_ANON_KEY\s*=\s*"REPLACE_BEFORE_PUBLISH"' dist/db.js; then
            echo "::error::EMBEDDED_ANON_KEY is still the placeholder. Set it in src/db.ts before tagging a release."
            exit 1
          fi

      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
